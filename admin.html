</head><body class="admin-body">
  <section class="admin-page">
    <div class="admin-header">
      <a class="brand" href="index.html"><img src="imagenes1/logo-icono.png" alt="Logo Rinconcito Ancashino"><span>Rinconcito Ancashino</span></a>
      <a class="btn btn-light" href="opiniones.html">Ver opiniones</a>
    </div>

    <div id="adminLoginBox" class="admin-login-card">
      <h1>Panel de opiniones</h1>
      <p>Ingresa con el correo administrador para aprobar, ocultar o eliminar opiniones.</p>
      <form id="adminLoginForm" class="formulario admin-login-form">
        <label>Correo administrador</label>
        <input type="email" name="email" value="integraglobalti@gmail.com" required>
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Tu contraseña de Firebase" required>
        <button class="btn" type="submit">Ingresar</button>
        <p id="adminLoginMsg" class="form-msg error"></p>
      </form>
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none">
      <div class="admin-panel-top">
        <div>
          <h1>Opiniones recibidas</h1>
          <p>Conectado como <strong id="adminUserText"></strong></p>
        </div>
        <button id="adminLogoutBtn" class="btn-admin btn-eliminar">Cerrar sesión</button>
      </div>
      <div id="adminTestimoniosLista" class="admin-list"></div>
    </div>
  </section>
<script type="module" src="admin-testimonios.js"></script></body></html>
